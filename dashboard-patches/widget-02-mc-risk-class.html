<!-- ═══════════════════════════════════════════════════════ -->
<script>
/**
 * updateMcRiskDisplay(strategy)
 *
 * Updates the MC risk classification widget rows on Page 1.
 *
 * @param {Object} strategy  — active_strategy object from /api/trading/cycle
 *   Expected fields:
 *     mc_p95_dd      {number}   — P95 max drawdown from Monte Carlo (%)
 *     mc_risk_class  {string}   — "Low" | "Medium" | "High"
 *     prop_firm_8pct {boolean}  — true = PASS, false = FAIL
 *     oos_penalty    {number}   — score multiplier, e.g. 0.92
 *     best_risk_pct  {number}   — recommended position size (%)
 */
function updateMcRiskDisplay(strategy) {
  if (!strategy) return;

  // ── MC Risk Class ────────────────────────────────────────
  const riskClassEl = document.getElementById('an-mc-risk-class');
  if (riskClassEl) {
    const rc = (strategy.mc_risk_class || '').trim();
    if (rc) {
      riskClassEl.textContent = rc.toUpperCase();
      // Color map: Low=teal, Medium=orange(--yellow), High=red
      const colorMap = {
        'low':    'var(--teal)',
        'medium': 'var(--yellow)',
        'high':   'var(--red)'
      };
      riskClassEl.style.color = colorMap[rc.toLowerCase()] || 'var(--subtext)';
    } else {
      riskClassEl.textContent = '—';
      riskClassEl.style.color = 'var(--subtext)';
    }
  }

  // ── Prop Firm 8% Rule ────────────────────────────────────
  const propFirmEl = document.getElementById('an-prop-firm-8pct');
  if (propFirmEl) {
    if (strategy.prop_firm_8pct == null) {
      propFirmEl.textContent = '—';
      propFirmEl.style.color = 'var(--subtext)';
    } else if (strategy.prop_firm_8pct) {
      propFirmEl.textContent = '✓ PASS';
      propFirmEl.style.color = 'var(--teal)';
    } else {
      propFirmEl.textContent = '✗ FAIL';
      propFirmEl.style.color = 'var(--red)';
    }
  }

  // ── MC P95 Drawdown (risk section copy) ─────────────────
  const mcP95El = document.getElementById('an-mc-p95-dd-risk');
  if (mcP95El) {
    mcP95El.textContent = strategy.mc_p95_dd != null
      ? strategy.mc_p95_dd.toFixed(1)
      : '—';
  }

  // ── OOS Penalty ──────────────────────────────────────────
  const oosPenaltyEl = document.getElementById('an-oos-penalty');
  if (oosPenaltyEl) {
    if (strategy.oos_penalty != null) {
      const p = parseFloat(strategy.oos_penalty);
      oosPenaltyEl.textContent = p.toFixed(2) + '× score';
      // Visually flag severe penalties (< 0.80)
      oosPenaltyEl.style.color = p >= 0.90
        ? 'var(--teal)'
        : p >= 0.80
          ? 'var(--yellow)'
          : 'var(--red)';
    } else {
      oosPenaltyEl.textContent = '—';
      oosPenaltyEl.style.color = 'var(--subtext)';
    }
  }

  // ── Best Risk Level ───────────────────────────────────────
  const bestRiskEl = document.getElementById('an-best-risk-pct');
  if (bestRiskEl) {
    bestRiskEl.textContent = strategy.best_risk_pct != null
      ? parseFloat(strategy.best_risk_pct).toFixed(1)
      : '—';
  }
}
</script>
<!-- END JS PATCH -->
